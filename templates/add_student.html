{% extends "base.html" %}

{% block content %}

<h2>Add Student</h2>

<form method="POST" action="{{ url_for('student.add_student') }}">
    <input type="text" name="name" placeholder="Student Name">

    <br><br>

    <input type="text" name="course" placeholder="Course">

    <br><br>

    <button type="submit">
        Save
    </button>
</form>

{% endblock %}

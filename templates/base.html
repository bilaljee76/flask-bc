<!DOCTYPE html>
<html>
<head>
    <title>Flask Student System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap.css') }}">
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"> -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>
<body>

<div class="container mt-4">

    <h1 class="text-primary">
        Flask Learning Project
    </h1>

    <a href="{{ url_for('main.home_page') }}">
        Home
    </a>

    |

    <a href="{{ url_for('main.about_page') }}">
        About
    </a>

    |

    <a href="{{ url_for('student.students_db') }}">
        Students
    </a>

    |

    <a href="{{ url_for('student.add_student') }}" class="btn btn-outline-success btn-sm">
        Add Student
    </a>

    <hr>

    {% with messages = get_flashed_messages() %}

        {% if messages %}

            {% for message in messages %}

                <div class="alert alert-success">
                    {{ message }}
                </div>
            {% endfor %}

        {% endif %}

    {% endwith %}

    {% block content %}
    {% endblock %}

</div>

</body>
</html>

{% extends "base.html" %}

{% block content %}

<h2>Register User</h2>

<form method="POST">

    <input
        type="text"
        name="username"
        placeholder="Username"
    >

    <br><br>

    <input
        type="email"
        name="email"
        placeholder="Email Address"
    >

    <br><br>

    <button type="submit">
        Register
    </button>

</form>

{% endblock %}

{% extends "base.html" %}

{% block content %}

<h2>Update Student</h2>

<form method="POST">

    <input
        type="text"
        name="name"
        value="{{ student[1] }}"
    >

    <br><br>

    <input
        type="text"
        name="course"
        value="{{ student[2] }}"
    >

    <br><br>

    <button type="submit">
        Update
    </button>

</form>

{% endblock %}

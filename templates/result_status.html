<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result</title>
</head>
<body>
    <h1>Student Result</h1>
    
    <p>Marks: {{ marks }}</p>

    {% if marks >= 90 %}
        <h2>Excellent</h2>
    
    {% elif marks >= 50 %}
        <h2>Pass</h2>
    
    {% else %}
        <h2>Fail</h2>
    {% endif %}
</body>
</html>
